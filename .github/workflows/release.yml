name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package .output
        run: zip -r savesmanager-output.zip .output

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: savesmanager-build
          path: savesmanager-output.zip
          retention-days: 7
          if-no-files-found: error

  release-please:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: [build, release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: savesmanager-build

      - name: Stage deploy assets
        run: |
          mkdir -p release-assets
          cp savesmanager-output.zip release-assets/
          cp deploy/savesmanager.service release-assets/
          cp deploy/update.sh release-assets/
          cp deploy/install.sh release-assets/

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" release-assets/* --clobber
